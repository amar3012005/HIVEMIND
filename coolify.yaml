# HIVE-MIND Coolify Deployment Configuration
# EU Sovereign Cloud Deployment (Hetzner/Scaleway/OVHcloud)
# Version: 1.0.0
# Compliance: GDPR, NIS2, DORA

version: '3.8'

services:
  # ==========================================
  # HIVE-MIND Core API
  # ==========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile.production
      args:
        - NODE_ENV=production
        - VERSION=${VERSION:-1.0.0}
        - BUILD_DATE=${BUILD_DATE:-2026-03-15}
    container_name: hivemind-api
    restart: unless-stopped
    
    # Security context
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: false
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    
    # Environment variables
    environment:
      # Core settings
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      
      # Database (PostgreSQL + Apache AGE)
      - DATABASE_URL=${DATABASE_URL}
      
      # Vector Store (Qdrant)
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      
      # LLM Configuration
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_INFERENCE_MODEL=${GROQ_INFERENCE_MODEL:-llama-3.3-70b-versatile}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - MISTRAL_EMBEDDING_MODEL=${MISTRAL_EMBEDDING_MODEL:-mistral-embed}
      
      # Redis (for sessions/pub-sub)
      - REDIS_URL=${REDIS_URL}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      
      # Security
      - API_MASTER_KEY=${API_MASTER_KEY}
      - SESSION_SECRET=${SESSION_SECRET}
      - HIVEMIND_MASTER_API_KEY=${HIVEMIND_MASTER_API_KEY}
      - HIVEMIND_ADMIN_SECRET=${HIVEMIND_ADMIN_SECRET}
      
      # Feature flags
      - USE_SITUATIONALIZER=${USE_SITUATIONALIZER:-true}
      - USE_CONTEXTUAL_EMBEDDING=${USE_CONTEXTUAL_EMBEDDING:-true}
      - USE_QDRANT_STORAGE=${USE_QDRANT_STORAGE:-true}
      
      # Audit logging
      - AUDIT_LOG_PATH=/app/logs/audit.log
      - AUDIT_RETENTION_DAYS=2555
      
      # Rate limiting
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX_REQUESTS=100
      
      # EU Sovereign settings
      - EU_REGION=${EU_REGION:-eu-central-1}
      - DATA_RESIDENCY=EU
      - GDPR_MODE=true
      
      # Logging
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    
    # Exposed port (Coolify will map this)
    ports:
      - "3000:3000"
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
        labels: "hivemind.component,hivemind.tier,environment"
    
    # Volumes for persistence
    volumes:
      - hivemind-logs:/app/logs
      - hivemind-data:/app/data
    
    # Labels for Coolify
    labels:
      - "coolify.name=hivemind-api"
      - "coolify.description=HIVE-MIND Core Memory Engine API"
      - "hivemind.component=api"
      - "hivemind.tier=core"
      - "hivemind.region=eu"
      - "hivemind.compliance=gdpr,nis2,dora"
      
      # Traefik labels (if using Coolify's Traefik)
      - "traefik.enable=true"
      - "traefik.http.routers.hivemind.rule=Host(`${COOLIFY_DOMAIN}`)"
      - "traefik.http.routers.hivemind.entrypoints=websecure"
      - "traefik.http.routers.hivemind.tls=true"
      - "traefik.http.routers.hivemind.tls.certresolver=letsencrypt"
      - "traefik.http.services.hivemind.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.hivemind-security.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.hivemind-security.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.hivemind-security.headers.stsPreload=true"
      - "traefik.http.middlewares.hivemind-security.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.hivemind-security.headers.browserXssFilter=true"
      - "traefik.http.routers.hivemind.middlewares=hivemind-security@docker"

  # ==========================================
  # PostgreSQL Database (Optional - use managed if available)
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: hivemind-postgres
    restart: unless-stopped
    
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-hivemind}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-hivemind}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --lc-collate=en_US.UTF-8 --lc-ctype=en_US.UTF-8
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_HOST_AUTH_METHOD=scram-sha-256
    
    volumes:
      - postgres-data:/var/lib/postgresql/data
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hivemind} -d ${POSTGRES_DB:-hivemind}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    
    labels:
      - "coolify.name=hivemind-postgres"
      - "coolify.description=PostgreSQL + Apache AGE Database"
      - "hivemind.component=database"
      - "hivemind.tier=core"
      - "hivemind.region=eu"

  # ==========================================
  # Qdrant Vector Database (Optional - use managed if available)
  # ==========================================
  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: hivemind-qdrant
    restart: unless-stopped
    
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__STORAGE__STORAGE_PATH=/qdrant/storage
      - QDRANT__LOG_LEVEL=INFO
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY}
      - QDRANT__TELEMETRY_DISABLED=true
    
    volumes:
      - qdrant-data:/qdrant/storage
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    
    labels:
      - "coolify.name=hivemind-qdrant"
      - "coolify.description=Qdrant Vector Database"
      - "hivemind.component=vector-store"
      - "hivemind.tier=core"
      - "hivemind.region=eu"

  # ==========================================
  # Redis (Optional - use managed if available)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: hivemind-redis
    restart: unless-stopped
    
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 300
      --save 900 1
      --save 300 10
      --save 60 10000
    
    volumes:
      - redis-data:/data
    
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    
    labels:
      - "coolify.name=hivemind-redis"
      - "coolify.description=Redis Session Store"
      - "hivemind.component=cache"
      - "hivemind.tier=core"
      - "hivemind.region=eu"

# ==========================================
# Named Volumes
# ==========================================
volumes:
  hivemind-logs:
    driver: local
  hivemind-data:
    driver: local
  postgres-data:
    driver: local
  qdrant-data:
    driver: local
  redis-data:
    driver: local

# ==========================================
# Networks
# ==========================================
networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
