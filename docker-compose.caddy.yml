version: '3.8'

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "8080:80"
      - "8443:443"
      - "2019:2019"  # Caddy admin API
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}

  app:
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npx prisma generate && node src/server.js"
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hivemind?schema=public
      REDIS_URL: redis://:redis@redis:6379/0
      QDRANT_URL: http://qdrant:6333
    volumes:
      - ./core:/app
    depends_on:
      - postgres
      - redis
      - qdrant

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hivemind
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass redis

  qdrant:
    image: qdrant/qdrant:v1.12.0
    volumes:
      - qdrant-data:/qdrant/storage

volumes:
  postgres-data:
  qdrant-data:
  caddy-data:
  caddy-config:
