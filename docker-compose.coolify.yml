services:
    app:
        build:
            context: .
            dockerfile: Dockerfile.production
            args:
                NODE_ENV: production
                VERSION: '${VERSION:-2.0.0}'
                BUILD_DATE: '${BUILD_DATE:-unknown}'
                CACHE_BUST: '${CACHE_BUST:-20260323}'
        image: 'hivemind/core-api:${VERSION:-latest}'
        container_name: app-s0k0s0k40wo44w4w8gcs8ow0-125656582242
        hostname: hivemind-api
        restart: unless-stopped
        # security_opt:
            # - 'no-new-privileges:true'
        # cap_drop:
            # - ALL
        cap_add:
            - NET_BIND_SERVICE
        read_only: false
        # user: '1001:1001'
        deploy:
            resources:
                limits:
                    cpus: '2'
                    memory: 2G
                reservations:
                    cpus: '0.5'
                    memory: 512M
            restart_policy:
                condition: on-failure
                delay: 5s
                max_attempts: 3
                window: 120s
        environment:
            NODE_ENV: production
            PORT: '3000'
            HOST: 0.0.0.0
            VERSION: '${VERSION:-2.0.0}'
            HIVEMIND_API_URL: '${HIVEMIND_API_URL:-https://core.hivemind.davinciai.eu:8050}'
            HIVEMIND_CORE_API_BASE_URL: '${HIVEMIND_CORE_API_BASE_URL:-https://core.hivemind.davinciai.eu:8050}'
