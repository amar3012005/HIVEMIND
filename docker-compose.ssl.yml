version: '3.8'

services:
  app:
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npx prisma generate && node src/server.js"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hivemind?schema=public
      REDIS_URL: redis://:redis@redis:6379/0
      QDRANT_URL: http://qdrant:6333
    volumes:
      - ./core:/app
    depends_on:
      - postgres
      - redis
      - qdrant

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hivemind
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass redis

  qdrant:
    image: qdrant/qdrant:v1.12.0
    volumes:
      - qdrant-data:/qdrant/storage

  caddy:
    image: caddy:latest
    ports:
      - "2028:443"
      - "2029:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app

volumes:
  postgres-data:
  qdrant-data:
