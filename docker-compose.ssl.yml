version: '3.8'

# HIVE-MIND with SSL (Let's Encrypt certificates mounted from host)
# SSL certificates must exist at:
#   /etc/letsencrypt/live/hivemind.davinciai.eu/fullchain.pem
#   /etc/letsencrypt/live/hivemind.davinciai.eu/privkey.pem
#
# To get certificates:
#   certbot certonly --standalone -d hivemind.davinciai.eu

services:
  # ═══════════════════════════════════════════════════════════
  # Caddy Reverse Proxy (handles SSL)
  # ═══════════════════════════════════════════════════════════
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt/live/hivemind.davinciai.eu/fullchain.pem:/certs/fullchain.pem:ro
      - /etc/letsencrypt/live/hivemind.davinciai.eu/privkey.pem:/certs/privkey.pem:ro
      - caddy-data:/data
      - caddy-config:/config
    command: >
      sh -c 'echo "{
        email admin@davinciai.eu
      }

      hivemind.davinciai.eu {
        tls /certs/fullchain.pem /certs/privkey.pem
        reverse_proxy app:3000
      }" > /etc/caddy/Caddyfile && caddy run --config /etc/caddy/Caddyfile'
    networks:
      - hivemind-network
    restart: unless-stopped
    depends_on:
      - app

  # ═══════════════════════════════════════════════════════════
  # HIVE-MIND App (no SSL, behind Caddy proxy)
  # ═══════════════════════════════════════════════════════════
  app:
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npx prisma generate && node src/server.js"
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hivemind?schema=public
      REDIS_URL: redis://:redis@redis:6379/0
      QDRANT_URL: http://qdrant:6333
    volumes:
      - ./core:/app
    networks:
      - hivemind-network
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - qdrant

  # ═══════════════════════════════════════════════════════════
  # PostgreSQL
  # ═══════════════════════════════════════════════════════════
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hivemind
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - hivemind-network
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════
  # Redis
  # ═══════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass redis
    networks:
      - hivemind-network
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════
  # Qdrant
  # ═══════════════════════════════════════════════════════════
  qdrant:
    image: qdrant/qdrant:v1.12.0
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - hivemind-network
    restart: unless-stopped

volumes:
  postgres-data:
  qdrant-data:
  caddy-data:
  caddy-config:

networks:
  hivemind-network:
    driver: bridge
