version: '3.8'

services:
  traefik:
    image: traefik:v3.0
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@davinciai.eu"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"

  app:
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npx prisma generate && node src/server.js"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hivemind?schema=public
      REDIS_URL: redis://:redis@redis:6379/0
      QDRANT_URL: http://qdrant:6333
    volumes:
      - ./core:/app
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hivemind.rule=Host(`hivemind.davinciai.eu`)"
      - "traefik.http.routers.hivemind.entrypoints=websecure"
      - "traefik.http.routers.hivemind.tls.certresolver=letsencrypt"
      - "traefik.http.services.hivemind.loadbalancer.server.port=3000"
    depends_on:
      - postgres
      - redis
      - qdrant

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hivemind
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass redis

  qdrant:
    image: qdrant/qdrant:v1.12.0
    volumes:
      - qdrant-data:/qdrant/storage

volumes:
  postgres-data:
  qdrant-data:
