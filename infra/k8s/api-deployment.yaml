# HIVE-MIND API Deployment
# K3s Production Deployment - EU Sovereign
# With Horizontal Pod Autoscaler

---
# ==========================================
# CONFIGMAP - API Configuration
# ==========================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: hivemind-api-config
  namespace: hivemind
  labels:
    app: hivemind-api
data:
  NODE_ENV: production
  PORT: "3000"
  HOST: "0.0.0.0"
  LOG_LEVEL: info
  LOG_FORMAT: json
  LOG_CORRELATION_ID_HEADER: X-Request-ID
  LOG_TRACE_ID_HEADER: X-Trace-ID

  # Database connection pool
  DATABASE_POOL_MIN: "2"
  DATABASE_POOL_MAX: "20"
  DATABASE_CONNECTION_TIMEOUT: "10000"

  # Redis configuration
  REDIS_POOL_MIN: "2"
  REDIS_POOL_MAX: "10"

  # Qdrant configuration
  QDRANT_COLLECTION: hivemind_memories
  QDRANT_BATCH_SIZE: "100"

  # Rate limiting
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX_REQUESTS: "100"

  # CORS
  CORS_ORIGIN: "https://hivemind.io,https://app.hivemind.io"

  # Health check
  HEALTH_CHECK_INTERVAL_MS: "30000"
  STARTUP_TIMEOUT_MS: "60000"

---
# ==========================================
# SECRET - API Secrets
# ==========================================
apiVersion: v1
kind: Secret
metadata:
  name: hivemind-api-secrets
  namespace: hivemind
  labels:
    app: hivemind-api
type: Opaque
stringData:
  # Database connection string
  DATABASE_URL: "postgresql://hivemind:${POSTGRES_PASSWORD}@postgres.hivemind.svc.cluster.local:5432/hivemind"

  # Redis connection string
  REDIS_URL: "redis://:${REDIS_PASSWORD}@redis.hivemind.svc.cluster.local:6379"

  # Qdrant configuration
  QDRANT_URL: "http://qdrant.hivemind.svc.cluster.local:6333"
  QDRANT_API_KEY: "${QDRANT_API_KEY}"

  # ZITADEL authentication
  ZITADEL_ISSUER_URL: "https://auth.hivemind.io"
  ZITADEL_CLIENT_ID: "${ZITADEL_CLIENT_ID}"
  ZITADEL_CLIENT_SECRET: "${ZITADEL_CLIENT_SECRET}"

  # HSM key reference
  HSM_MASTER_KEY: "${HSM_MASTER_KEY}"

  # Sentry DSN (optional)
  SENTRY_DSN: "${SENTRY_DSN:-}"

---
# ==========================================
# DEPLOYMENT
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hivemind-api
  namespace: hivemind
  labels:
    app: hivemind-api
    component: api
    tier: application
    version: v1
spec:
  # Replicas managed by HPA
  replicas: 3

  # Rolling update strategy for zero-downtime
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: hivemind-api

  template:
    metadata:
      labels:
        app: hivemind-api
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
        # Force redeployment on config change
        config-hash: |
          {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      # Security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      # Service account
      serviceAccountName: hivemind-api
      automountServiceAccountToken: false

      # DNS configuration
      dnsPolicy: ClusterFirst
      dnsConfig:
        options:
          - name: ndots
            value: "5"

      # Termination grace period
      terminationGracePeriodSeconds: 60

      # Init containers
      initContainers:
        # Wait for database to be ready
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              while ! nc -z postgres-service 5432; do
                sleep 2
              done
              echo "PostgreSQL is ready"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001

        # Wait for Redis to be ready
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Redis..."
              while ! nc -z redis-service 6379; do
                sleep 2
              done
              echo "Redis is ready"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001

        # Wait for Qdrant to be ready
        - name: wait-for-qdrant
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Qdrant..."
              while ! nc -z qdrant-service 6333; do
                sleep 2
              done
              echo "Qdrant is ready"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001

      # Main containers
      containers:
        - name: api
          image: hivemind/core:latest
          imagePullPolicy: Always

          # Ports
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          # Environment variables from ConfigMap
          envFrom:
            - configMapRef:
              name: hivemind-api-config

          # Environment variables from Secret
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: hivemind-api-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: hivemind-api-secrets
                  key: REDIS_URL
            - name: QDRANT_URL
              valueFrom:
                secretKeyRef:
                  name: hivemind-api-secrets
                  key: QDRANT_URL
            - name: QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hivemind-api-secrets
                  key: QDRANT_API_KEY
            - name: ZITADEL_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: hivemind-api-secrets
                  key: ZITADEL_CLIENT_ID
            - name: ZITADEL_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: hivemind-api-secrets
                  key: ZITADEL_CLIENT_SECRET
            - name: HSM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: hivemind-api-secrets
                  key: HSM_MASTER_KEY
            # Pod metadata for logging
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

          # Volume mounts
          volumeMounts:
            - name: logs
              mountPath: /app/logs
            - name: tmp
              mountPath: /tmp

          # Resource requests and limits
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 2
              memory: 2Gi

          # Liveness probe
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
            successThreshold: 1

          # Readiness probe
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          # Startup probe (for slow container starts)
          startupProbe:
            httpGet:
              path: /health
              port: 3000
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30

          # Security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

          # Lifecycle hooks
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    echo "Received SIGTERM, waiting for connections to drain..."
                    sleep 10
                    echo "Shutting down..."

        # Optional: Sidecar for log shipping
        # - name: log-shipper
        #   image: fluent/fluent-bit:2.1
        #   ...

      # Affinity rules
      affinity:
        # Pod anti-affinity - spread across nodes
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: hivemind-api
                topologyKey: kubernetes.io/hostname

        # Node affinity
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              preference:
                matchExpressions:
                  - key: workload-type
                    operator: In
                    values:
                      - api
                      - general

      # Topology spread constraints
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: hivemind-api

      # Tolerations
      tolerations:
        - key: "node-role.kubernetes.io/master"
          operator: "Exists"
          effect: "NoSchedule"

      # Volumes
      volumes:
        - name: logs
          emptyDir:
            sizeLimit: 1Gi
        - name: tmp
          emptyDir:
            sizeLimit: 512Mi

---
# ==========================================
# HORIZONTAL POD AUTOSCALER
# ==========================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hivemind-api-hpa
  namespace: hivemind
  labels:
    app: hivemind-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hivemind-api

  # Replica bounds
  minReplicas: 2
  maxReplicas: 10

  # Scaling behavior
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30
      selectPolicy: Max

  # Metrics
  metrics:
    # CPU utilization target
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

    # Memory utilization target
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

    # Custom metric: requests per second (if available)
    # - type: Pods
    #   pods:
    #     metric:
    #       name: http_requests_per_second
    #     target:
    #       type: AverageValue
    #       averageValue: 100

---
# ==========================================
# SERVICE
# ==========================================
apiVersion: v1
kind: Service
metadata:
  name: hivemind-api
  namespace: hivemind
  labels:
    app: hivemind-api
    component: api
  annotations:
    # Traefik service annotation
    traefik.ingress.kubernetes.io/service.sticky: "true"
    traefik.ingress.kubernetes.io/service.sticky.cookie.httponly: "true"
    traefik.ingress.kubernetes.io/service.sticky.cookie.secure: "true"
spec:
  type: ClusterIP
  selector:
    app: hivemind-api
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
      appProtocol: http

---
# ==========================================
# POD DISRUPTION BUDGET
# ==========================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: hivemind-api-pdb
  namespace: hivemind
  labels:
    app: hivemind-api
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: hivemind-api
