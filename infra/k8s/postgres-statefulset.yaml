# HIVE-MIND PostgreSQL StatefulSet
# K3s Production Deployment - EU Sovereign
# PostgreSQL 15 with Apache AGE extension

---
# ==========================================
# SECRET - Database Credentials
# ==========================================
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: hivemind
  labels:
    app: postgres
    component: database
type: Opaque
stringData:
  username: hivemind
  password: "${POSTGRES_PASSWORD}"  # Injected via CI/CD or external secrets
  replication-username: replicator
  replication-password: "${REPLICATION_PASSWORD}"
  # Connection string for applications
  database-url: "postgresql://hivemind:${POSTGRES_PASSWORD}@postgres.hivemind.svc.cluster.local:5432/hivemind"

---
# ==========================================
# CONFIGMAP - PostgreSQL Configuration
# ==========================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: hivemind
  labels:
    app: postgres
data:
  POSTGRES_DB: hivemind
  POSTGRES_USER: hivemind
  PGDATA: /var/lib/postgresql/data/pgdata

  # PostgreSQL tuning for 8GB RAM
  postgresql.conf: |
    # Connection settings
    max_connections = 200
    superuser_reserved_connections = 5

    # Memory settings
    shared_buffers = 2GB
    effective_cache_size = 6GB
    maintenance_work_mem = 512MB
    work_mem = 10MB
    temp_buffers = 64MB

    # WAL settings
    wal_buffers = 16MB
    min_wal_size = 1GB
    max_wal_size = 4GB
    checkpoint_completion_target = 0.9
    wal_compression = on
    random_page_cost = 1.1

    # Parallel query settings
    max_worker_processes = 4
    max_parallel_workers_per_gather = 2
    max_parallel_workers = 4
    max_parallel_maintenance_workers = 2
    parallel_leader_participation = on

    # Query planning
    default_statistics_target = 100
    effective_io_concurrency = 200

    # Logging
    log_min_duration_statement = 1000
    log_checkpoints = on
    log_connections = on
    log_disconnections = on
    log_lock_waits = on
    log_temp_files = 0
    log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '

    # Extensions
    shared_preload_libraries = 'pg_stat_statements,age'
    pg_stat_statements.track = all
    pg_stat_statements.max = 10000

    # Apache AGE
    load = 'age'
    search_path = '"$user", public, ag_catalog'

    # Replication
    wal_level = replica
    max_wal_senders = 5
    max_replication_slots = 5
    hot_standby = on
    hot_standby_feedback = on

    # Security
    password_encryption = scram-sha-256
    ssl = off  # TLS handled by service mesh or sidecar

---
# ==========================================
# PERSISTENT VOLUME CLAIM
# ==========================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: hivemind
  labels:
    app: postgres
    component: database
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Gi
  storageClassName: local-path
  # For production, consider using a cloud provider storage class:
  # storageClassName: csi-scaleway-scw

---
# ==========================================
# PERSISTENT VOLUME CLAIM - WAL
# ==========================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-wal
  namespace: hivemind
  labels:
    app: postgres
    component: database
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: local-path

---
# ==========================================
# STATEFULSET
# ==========================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: hivemind
  labels:
    app: postgres
    component: database
    tier: data
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        component: database
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
        prometheus.io/path: "/metrics"
    spec:
      # Security context
      securityContext:
        fsGroup: 999  # postgres user
        runAsGroup: 999
        runAsNonRoot: false  # PostgreSQL needs root for init
        seccompProfile:
          type: RuntimeDefault

      # Service account
      serviceAccountName: hivemind-db

      # Termination grace period for graceful shutdown
      terminationGracePeriodSeconds: 120

      # Init containers
      initContainers:
        # Set proper permissions on data directory
        - name: init-data-dir
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              chown -R 999:999 /var/lib/postgresql/data
              chmod 700 /var/lib/postgresql/data
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data

      # Containers
      containers:
        - name: postgres
          image: postgres:15.4-alpine
          imagePullPolicy: IfNotPresent

          # Ports
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP

          # Environment variables
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_DB
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
            - name: PGDATA
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: PGDATA
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP

          # Volume mounts
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-config
              mountPath: /etc/postgresql/postgresql.conf
              subPath: postgresql.conf
              readOnly: true
            - name: postgres-wal
              mountPath: /var/lib/postgresql/wal

          # Resource limits
          resources:
            requests:
              cpu: 2
              memory: 4Gi
            limits:
              cpu: 4
              memory: 8Gi

          # Liveness probe
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - hivemind
                - -h
                - 127.0.0.1
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
            successThreshold: 1

          # Readiness probe
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - hivemind
                - -h
                - 127.0.0.1
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1

          # Startup probe (for slow starts)
          startupProbe:
            exec:
              command:
                - pg_isready
                - -U
                - hivemind
                - -h
                - 127.0.0.1
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30

          # Security context
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - SETGID
                - SETUID
            readOnlyRootFilesystem: false

          # Lifecycle hooks
          lifecycle:
            preStop:
              exec:
                command:
                  - pg_ctl
                  - -D
                  - /var/lib/postgresql/data/pgdata
                  - -m
                  - fast
                  - stop

      # Affinity rules for high availability
      affinity:
        # Pod anti-affinity - spread across nodes
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: postgres
                topologyKey: kubernetes.io/hostname

        # Node affinity - prefer nodes with SSDs
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              preference:
                matchExpressions:
                  - key: storage-type
                    operator: In
                    values:
                      - ssd
                      - nvme

      # Tolerations
      tolerations:
        - key: "database"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"

      # Topology spread constraints
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: postgres

      # Volumes
      volumes:
        - name: postgres-config
          configMap:
            name: postgres-config
            defaultMode: 0644

  # Volume claim templates
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
        labels:
          app: postgres
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 500Gi
        storageClassName: local-path
    - metadata:
        name: postgres-wal
        labels:
          app: postgres
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 50Gi
        storageClassName: local-path

---
# ==========================================
# HEADLESS SERVICE
# ==========================================
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: hivemind
  labels:
    app: postgres
    component: database
spec:
  clusterIP: None  # Headless service for StatefulSet
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP

---
# ==========================================
# CLUSTERIP SERVICE (for stable endpoint)
# ==========================================
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: hivemind
  labels:
    app: postgres
    component: database
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
