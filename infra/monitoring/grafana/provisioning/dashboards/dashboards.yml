# Grafana Dashboard Provisioning
# HIVE-MIND Monitoring Stack

apiVersion: 1

providers:
  - name: 'HIVE-MIND Dashboards'
    orgId: 1
    folder: 'HIVE-MIND'
    folderUid: 'hivemind'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
