# HIVE-MIND Prometheus Configuration
# EU Sovereign Deployment
# Scrape configs for all services

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    environment: production
    region: eu-central
    cluster: hivemind

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
      scheme: http
      timeout: 10s
      api_version: v2

# Rule files
rule_files:
  - /etc/prometheus/rules/*.yml

# Scrape configurations
scrape_configs:
  # ==========================================
  # PROMETHEUS SELF-MONITORING
  # ==========================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: prometheus
          team: platform
    scrape_interval: 15s
    metrics_path: /metrics
    scheme: http

  # ==========================================
  # HIVE-MIND API SERVICE
  # ==========================================
  - job_name: 'hivemind-api'
    static_configs:
      - targets: ['api:3000']
        labels:
          service: hivemind-api
          team: core
          environment: production
    scrape_interval: 15s
    metrics_path: /metrics
    scheme: http
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '(.+):(\d+)'
        replacement: '${1}'

  # ==========================================
  # POSTGRESQL
  # ==========================================
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: postgresql
          team: data
    scrape_interval: 15s
    metrics_path: /metrics
    scheme: http

  # ==========================================
  # REDIS
  # ==========================================
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: redis
          team: core
    scrape_interval: 15s
    metrics_path: /metrics
    scheme: http

  # ==========================================
  # QDRANT
  # ==========================================
  - job_name: 'qdrant'
    static_configs:
      - targets: ['qdrant:6333']
        labels:
          service: qdrant
          team: ai
    scrape_interval: 15s
    metrics_path: /metrics
    scheme: http

  # ==========================================
  # TRAEFIK
  # ==========================================
  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8082']
        labels:
          service: traefik
          team: platform
    scrape_interval: 15s
    metrics_path: /metrics
    scheme: http

  # ==========================================
  # NODE EXPORTER
  # ==========================================
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: node-exporter
          team: platform
    scrape_interval: 15s
    metrics_path: /metrics
    scheme: http

  # ==========================================
  # CADVISOR (Container Metrics)
  # ==========================================
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: cadvisor
          team: platform
    scrape_interval: 15s
    metrics_path: /metrics
    scheme: http

  # ==========================================
  # GRAFANA
  # ==========================================
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
        labels:
          service: grafana
          team: platform
    scrape_interval: 15s
    metrics_path: /metrics
    scheme: http

  # ==========================================
  # ALERTMANAGER
  # ==========================================
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
        labels:
          service: alertmanager
          team: platform
    scrape_interval: 15s
    metrics_path: /metrics
    scheme: http

  # ==========================================
  # DOCKER CONTAINER METRICS
  # ==========================================
  - job_name: 'docker'
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["traefik.enable=true"]
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: container
      - source_labels: [__meta_docker_container_label_com_hivemind_component]
        target_label: component

  # ==========================================
  # BLACKBOX EXPORTER (External probes)
  # ==========================================
  # Uncomment when blackbox exporter is deployed
  # - job_name: 'blackbox-http'
  #   metrics_path: /probe
  #   params:
  #     module: [http_2xx]
  #   static_configs:
  #     - targets:
  #         - https://api.hivemind.io/health
  #         - https://api.hivemind.io/ready
  #   relabel_configs:
  #     - source_labels: [__address__]
  #       target_label: __param_target
  #     - source_labels: [__param_target]
  #       target_label: instance
  #     - target_label: __address__
  #       replacement: blackbox-exporter:9115

  # ==========================================
  # PUSHGATEWAY (Batch Jobs)
  # ==========================================
  - job_name: 'pushgateway'
    honor_labels: true
    static_configs:
      - targets: ['pushgateway:9091']
        labels:
          service: pushgateway
          team: platform
    scrape_interval: 15s
    metrics_path: /metrics
    scheme: http
