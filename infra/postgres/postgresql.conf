# =============================================================================
# HIVE-MIND PostgreSQL 15 Production Configuration
# Optimized for EU Sovereign Cloud Deployment
# =============================================================================
# Memory: 4GB allocated to PostgreSQL container
# CPU: 2 cores
# Storage: SSD with LUKS2 encryption
# =============================================================================

# -----------------------------------------------------------------------------
# CONNECTIONS AND AUTHENTICATION
# -----------------------------------------------------------------------------
listen_addresses = '*'
port = 5432
max_connections = 200
superuser_reserved_connections = 3

# SSL Configuration
ssl = off
# ssl_cert_file = '/etc/ssl/certs/server.crt'
# ssl_key_file = '/etc/ssl/private/server.key'
# ssl_ca_file = '/etc/ssl/certs/ca.crt'
ssl_crl_file = ''
ssl_ciphers = 'HIGH:!aNULL:!MD5'
ssl_prefer_server_ciphers = on
ssl_ecdh_curve = 'prime256v1'
ssl_min_protocol_version = 'TLSv1.2'

# Authentication
password_encryption = scram-sha-256
authentication_timeout = 1min

# -----------------------------------------------------------------------------
# RESOURCE USAGE (except WAL)
# -----------------------------------------------------------------------------
# Memory settings for 4GB container
shared_buffers = 1GB
effective_cache_size = 3GB
maintenance_work_mem = 256MB
work_mem = 16MB
hash_mem_multiplier = 2.0
dynamic_shared_memory_type = posix

# Disk
temp_file_limit = 1GB

# Background Writer
bgwriter_delay = 200ms
bgwriter_lru_maxpages = 100
bgwriter_lru_multiplier = 2.0
bgwriter_flush_after = 512kB

# -----------------------------------------------------------------------------
# WRITE-AHEAD LOG
# -----------------------------------------------------------------------------
wal_level = replica
wal_buffers = 16MB
max_wal_size = 2GB
min_wal_size = 512MB
checkpoint_completion_target = 0.9
checkpoint_timeout = 10min
checkpoint_flush_after = 256kB

# Archiving
archive_mode = off
# archive_command = 'cp %p /archive/%f'
archive_timeout = 1hour

# -----------------------------------------------------------------------------
# REPLICATION
# -----------------------------------------------------------------------------
max_wal_senders = 10
max_replication_slots = 10
wal_keep_size = 1GB
hot_standby = on
hot_standby_feedback = on
wal_receiver_status_interval = 10s
wal_receiver_timeout = 60s
wal_retrieve_retry_interval = 5s

# -----------------------------------------------------------------------------
# QUERY TUNING
# -----------------------------------------------------------------------------
random_page_cost = 1.1
effective_io_concurrency = 200

# Parallelism
max_worker_processes = 8
max_parallel_maintenance_workers = 2
max_parallel_workers_per_gather = 2
max_parallel_workers = 8
parallel_leader_participation = on

# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------
log_destination = 'stderr'
logging_collector = off
# log_directory = '/var/log/postgresql'
# log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_file_mode = 0600
log_rotation_age = 1d
log_rotation_size = 100MB
log_truncate_on_rotation = off

# Log levels
log_min_messages = warning
log_min_error_statement = error
log_min_duration_statement = 1000ms

# What to log
log_checkpoints = on
log_connections = on
log_disconnections = on
log_duration = off
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_lock_waits = on
log_statement = 'ddl'
log_temp_files = 16MB
log_autovacuum_min_duration = 1s

# -----------------------------------------------------------------------------
# AUTOVACUUM
# -----------------------------------------------------------------------------
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_vacuum_scale_factor = 0.2
autovacuum_analyze_threshold = 50
autovacuum_analyze_scale_factor = 0.1
autovacuum_vacuum_cost_delay = 2ms
autovacuum_vacuum_cost_limit = -1

# -----------------------------------------------------------------------------
# CLIENT CONNECTION DEFAULTS
# -----------------------------------------------------------------------------
# Locale
datestyle = 'iso, mdy'
timezone = 'UTC'
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'
default_text_search_config = 'pg_catalog.english'

# Statement behavior
statement_timeout = 30s
lock_timeout = 10s
idle_in_transaction_session_timeout = 10min
vacuum_freeze_table_age = 1500000000
vacuum_freeze_min_age = 50000000
vacuum_multixact_freeze_table_age = 1500000000
vacuum_multixact_freeze_min_age = 5000000

# -----------------------------------------------------------------------------
# EXTENSIONS
# -----------------------------------------------------------------------------
# Apache AGE
shared_preload_libraries = 'age'

# -----------------------------------------------------------------------------
# VERSION AND PLATFORM COMPATIBILITY
# -----------------------------------------------------------------------------
escape_string_warning = on
lo_compat_privileges = off
operator_precedence_warning = off
quote_all_identifiers = off
standard_conforming_strings = on
synchronize_seqscans = on

# -----------------------------------------------------------------------------
# ERROR HANDLING
# -----------------------------------------------------------------------------
exit_on_error = off
restart_after_crash = on

# -----------------------------------------------------------------------------
# CONFIG FILE INCLUDES
# -----------------------------------------------------------------------------
include_if_exists = 'conf.d/*.conf'
