<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PageIndex Brainstorm - HIVEMIND</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.0/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Space Grotesk', system-ui, sans-serif; background: #faf9f4; }
    .node { transition: all 0.3s ease; }
    .node:hover { transform: scale(1.05); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Sample hierarchical structure visualization
    const HierarchyTree = ({ level = 0, data, onSelect, selected }) => {
      const [expanded, setExpanded] = useState(true);

      if (!data) return null;

      const hasChildren = data.children && data.children.length > 0;
      const isSelected = selected === data.id;

      return (
        <div style={{ marginLeft: level * 24 }}>
          <div
            className={`node flex items-center gap-2 p-2 rounded-lg cursor-pointer mb-1 ${
              isSelected ? 'bg-[#117dff]/20 border border-[#117dff]' : 'bg-white border border-[#e3e0db] hover:border-[#117dff]/40'
            }`}
            onClick={() => onSelect(data)}
          >
            {hasChildren && (
              <button
                onClick={(e) => { e.stopPropagation(); setExpanded(!expanded); }}
                className="w-5 h-5 flex items-center justify-center rounded hover:bg-[#f3f1ec]"
              >
                {expanded ? '▼' : '▶'}
              </button>
            )}
            <span className={`text-xs font-medium ${data.type === 'topic' ? 'text-[#117dff]' : 'text-[#525252]'}`}>
              {data.icon} {data.label}
            </span>
            {data.memoryCount && (
              <span className="ml-auto text-[10px] font-mono bg-[#16a34a]/10 text-[#16a34a] px-1.5 py-0.5 rounded">
                {data.memoryCount} memories
              </span>
            )}
          </div>

          {hasChildren && expanded && (
            <div>
              {data.children.map((child, i) => (
                <HierarchyTree
                  key={child.id || i}
                  data={child}
                  level={level + 1}
                  onSelect={onSelect}
                  selected={selected}
                />
              ))}
            </div>
          )}
        </div>
      );
    };

    // Architecture layer visualization
    const ArchitectureLayer = ({ title, color, items, description }) => (
      <div className={`border-2 rounded-xl p-4 ${color} space-y-2`}>
        <h3 className="text-sm font-bold uppercase tracking-wide">{title}</h3>
        <p className="text-xs text-[#525252]">{description}</p>
        <div className="flex flex-wrap gap-1 mt-2">
          {items.map((item, i) => (
            <span key={i} className="text-[10px] font-mono bg-white/50 px-2 py-1 rounded">
              {item}
            </span>
          ))}
        </div>
      </div>
    );

    // Query flow diagram
    const QueryFlow = () => (
      <div className="flex items-center gap-2 flex-wrap justify-center p-4">
        <div className="bg-[#117dff] text-white px-4 py-2 rounded-lg text-xs font-medium">
          User Query
        </div>
        <div className="text-[#a3a3a3]">→</div>
        <div className="bg-[#f59e0b] text-white px-4 py-2 rounded-lg text-xs font-medium">
          PageIndex (Hierarchical)
        </div>
        <div className="text-[#a3a3a3]">→</div>
        <div className="bg-[#16a34a] text-white px-4 py-2 rounded-lg text-xs font-medium">
          Memory IDs Found
        </div>
        <div className="text-[#a3a3a3]">→</div>
        <div className="bg-[#8b5cf6] text-white px-4 py-2 rounded-lg text-xs font-medium">
          PostgreSQL + VectorDB
        </div>
        <div className="text-[#a3a3a3]">→</div>
        <div className="bg-[#10b981] text-white px-4 py-2 rounded-lg text-xs font-medium">
          Full Memories
        </div>
      </div>
    );

    const App = () => {
      const [activeTab, setActiveTab] = useState('hierarchy');
      const [selectedNode, setSelectedNode] = useState(null);

      // Sample hierarchy data
      const hierarchyData = {
        id: 'root',
        label: 'HIVEMIND Memory Index',
        icon: '🧠',
        type: 'root',
        children: [
          {
            id: 'projects',
            label: 'Projects',
            icon: '📁',
            type: 'category',
            children: [
              { id: 'davinci', label: 'DaVinci AI', icon: '🚀', type: 'topic', memoryCount: 47, children: [
                { id: 'davinci-marketing', label: 'Marketing', icon: '📢', type: 'subtopic', memoryCount: 12 },
                { id: 'davinci-tech', label: 'Technical Architecture', icon: '⚙️', type: 'subtopic', memoryCount: 23 },
                { id: 'davinci-meetings', label: 'Meeting Notes', icon: '📝', type: 'subtopic', memoryCount: 12 },
              ]},
              { id: 'tara', label: 'TARA Voice Agent', icon: '🎙️', type: 'topic', memoryCount: 89, children: [
                { id: 'tara-clinical', label: 'Clinical Reasoning', icon: '🏥', type: 'subtopic', memoryCount: 34 },
                { id: 'tara-sessions', label: 'Session Logs', icon: '💬', type: 'subtopic', memoryCount: 55 },
              ]},
            ]
          },
          {
            id: 'people',
            label: 'People & Roles',
            icon: '👥',
            type: 'category',
            children: [
              { id: 'amar', label: 'Amar (Founder)', icon: '👤', type: 'person', memoryCount: 156 },
              { id: 'team', label: 'Team Members', icon: '👨‍💼', type: 'category', memoryCount: 78 },
            ]
          },
          {
            id: 'knowledge',
            label: 'Knowledge Domains',
            icon: '📚',
            type: 'category',
            children: [
              { id: 'ai-ml', label: 'AI/ML', icon: '🤖', type: 'domain', memoryCount: 234 },
              { id: 'eu-compliance', label: 'EU Compliance', icon: '🇪🇺', type: 'domain', memoryCount: 67 },
              { id: 'memory-systems', label: 'Memory Systems', icon: '🧩', type: 'domain', memoryCount: 189 },
            ]
          },
        ]
      };

      const tabs = [
        { id: 'hierarchy', label: 'Hierarchy Explorer', icon: '🌳' },
        { id: 'architecture', label: '3-Layer Architecture', icon: '🏗️' },
        { id: 'flow', label: 'Query Flow', icon: '🔄' },
        { id: 'assignment', label: 'Auto-Assignment', icon: '🎯' },
      ];

      return (
        <div className="min-h-screen p-6">
          <header className="mb-6">
            <h1 className="text-2xl font-bold text-[#0a0a0a]">PageIndex Brainstorm — HIVEMIND</h1>
            <p className="text-sm text-[#525252]">Exploring hierarchical memory indexing with blueprint layer</p>
          </header>

          {/* Tab Navigation */}
          <div className="flex gap-2 mb-6 border-b border-[#e3e0db]">
            {tabs.map(tab => (
              <button
                key={tab.id}
                onClick={() => setActiveTab(tab.id)}
                className={`px-4 py-2 text-xs font-medium rounded-t-lg transition-colors ${
                  activeTab === tab.id
                    ? 'bg-[#117dff] text-white'
                    : 'bg-white text-[#525252] hover:bg-[#f3f1ec]'
                }`}
              >
                {tab.icon} {tab.label}
              </button>
            ))}
          </div>

          {/* Content Area */}
          <div className="bg-white rounded-xl border border-[#e3e0db] p-6 min-h-[500px]">

            {/* HIERARCHY TAB */}
            {activeTab === 'hierarchy' && (
              <div className="grid grid-cols-2 gap-6">
                <div>
                  <h3 className="text-sm font-semibold mb-3">Sample Hierarchy</h3>
                  <HierarchyTree
                    data={hierarchyData}
                    onSelect={setSelectedNode}
                    selected={selectedNode?.id}
                  />
                </div>
                <div className="border-l border-[#e3e0db] pl-6">
                  <h3 className="text-sm font-semibold mb-3">Node Details</h3>
                  {selectedNode ? (
                    <div className="space-y-3">
                      <div className="text-lg">{selectedNode.icon} {selectedNode.label}</div>
                      <div className="text-xs font-mono text-[#a3a3a3]">ID: {selectedNode.id}</div>
                      <div className="text-xs">Type: <span className="font-mono bg-[#f3f1ec] px-1.5 py-0.5 rounded">{selectedNode.type}</span></div>
                      {selectedNode.memoryCount && (
                        <div className="text-xs">Memories: <span className="font-semibold text-[#16a34a]">{selectedNode.memoryCount}</span></div>
                      )}
                      <div className="border-t border-[#e3e0db] pt-3 mt-3">
                        <h4 className="text-xs font-semibold mb-2">Metadata Structure:</h4>
                        <pre className="text-[10px] font-mono bg-[#faf9f4] p-2 rounded overflow-auto">
{JSON.stringify({
  id: selectedNode.id,
  label: selectedNode.label,
  type: selectedNode.type,
  parent_id: selectedNode.id.split('-')[0],
  path: `/hivemind/${selectedNode.id}`,
  memory_ids: ['mem_001', 'mem_002', '...'],
  auto_generated: true,
  custom_branch: false,
  depth: selectedNode.id.split('-').length
}, null, 2)}
                        </pre>
                      </div>
                    </div>
                  ) : (
                    <p className="text-sm text-[#a3a3a3]">Select a node to view details</p>
                  )}
                </div>
              </div>
            )}

            {/* ARCHITECTURE TAB */}
            {activeTab === 'architecture' && (
              <div className="space-y-4">
                <h3 className="text-sm font-semibold">Three-Layer Memory Architecture</h3>
                <div className="space-y-3">
                  <ArchitectureLayer
                    title="Layer 1: PageIndex (Blueprint Layer)"
                    color="border-[#f59e0b] bg-[#f59e0b]/5"
                    items={['Memory IDs only', 'Hierarchical nodes', 'Topic/project subgraphs', 'Auto + manual classification']}
                    description="Lightweight hierarchical blueprint — stores only memory IDs organized by topic/project. Sub-10ms traversal."
                  />
                  <div className="flex justify-center">
                    <div className="text-2xl text-[#a3a3a3">↓</div>
                  </div>
                  <ArchitectureLayer
                    title="Layer 2: PostgreSQL (Lexical Layer)"
                    color="border-[#117dff] bg-[#117dff]/5"
                    items={['Full memory content', 'Structured metadata', 'Relationships (Updates/Extends/Derives)', 'User/Org/Project scope']}
                    description="Complete memory storage with rich metadata, temporal grounding, and relationship tracking."
                  />
                  <div className="flex justify-center">
                    <div className="text-2xl text-[#a3a3a3]">↓</div>
                  </div>
                  <ArchitectureLayer
                    title="Layer 3: VectorDB (Semantic Layer)"
                    color="border-[#8b5cf6] bg-[#8b5cf6]/5"
                    items={['1024-d embeddings', 'Semantic similarity search', 'Cross-topic retrieval', 'Parallel to PageIndex']}
                    description="Dense vector embeddings for semantic search — works in parallel with PageIndex for hybrid retrieval."
                  />
                </div>

                <div className="mt-6 p-4 bg-[#faf9f4] rounded-lg border border-[#e3e0db]">
                  <h4 className="text-xs font-semibold mb-2">Key Design Decisions:</h4>
                  <ul className="text-xs space-y-1 text-[#525252]">
                    <li>• <strong>PageIndex stores IDs only</strong> — full memories remain in PostgreSQL</li>
                    <li>• <strong>Parallel queries</strong> — PageIndex for navigation, VectorDB for semantic similarity</li>
                    <li>• <strong>Auto-assignment</strong> — LLM classifies new memories into hierarchy nodes</li>
                    <li>• <strong>Custom branches</strong> — users can create/edit hierarchy nodes</li>
                    <li>• <strong>Cross-referencing</strong> — single memory can belong to multiple nodes</li>
                  </ul>
                </div>
              </div>
            )}

            {/* FLOW TAB */}
            {activeTab === 'flow' && (
              <div>
                <h3 className="text-sm font-semibold mb-4">Query Flow: From Question to Answer</h3>
                <QueryFlow />

                <div className="mt-6 grid grid-cols-1 gap-3">
                  <div className="p-3 bg-[#117dff]/5 border border-[#117dff]/20 rounded-lg">
                    <h4 className="text-xs font-semibold text-[#117dff] mb-1">Step 1: PageIndex Lookup</h4>
                    <p className="text-xs text-[#525252]">User query → find relevant topic nodes via keyword/semantic match → collect memory IDs</p>
                  </div>
                  <div className="p-3 bg-[#16a34a]/5 border border-[#16a34a]/20 rounded-lg">
                    <h4 className="text-xs font-semibold text-[#16a34a] mb-1">Step 2: ID-Based Retrieval</h4>
                    <p className="text-xs text-[#525252]">Use collected IDs to fetch full memories from PostgreSQL with exact match</p>
                  </div>
                  <div className="p-3 bg-[#8b5cf6]/5 border border-[#8b5cf6]/20 rounded-lg">
                    <h4 className="text-xs font-semibold text-[#8b5cf6] mb-1">Step 3: Parallel Semantic Search</h4>
                    <p className="text-xs text-[#525252]">VectorDB runs semantic search in parallel — catches memories outside PageIndex hierarchy</p>
                  </div>
                  <div className="p-3 bg-[#f59e0b]/5 border border-[#f59e0b]/20 rounded-lg">
                    <h4 className="text-xs font-semibold text-[#f59e0b] mb-1">Step 4: Fusion & Ranking</h4>
                    <p className="text-xs text-[#525252]">Combine PageIndex results + VectorDB results → deduplicate → rank by relevance</p>
                  </div>
                </div>
              </div>
            )}

            {/* ASSIGNMENT TAB */}
            {activeTab === 'assignment' && (
              <div>
                <h3 className="text-sm font-semibold mb-4">Auto-Assignment: How Memories Find Their Place</h3>

                <div className="grid grid-cols-2 gap-6">
                  <div className="space-y-3">
                    <h4 className="text-xs font-semibold">Approach Options:</h4>

                    <div className="p-3 border border-[#e3e0db] rounded-lg">
                      <div className="text-xs font-semibold text-[#117dff] mb-1">A) LLM Classifier (Recommended)</h4>
                      <p className="text-xs text-[#525252] mb-2">Embed query + hierarchy node labels → find best match via cosine similarity</p>
                      <div className="text-[10px] font-mono bg-[#faf9f4] p-2 rounded">
                        LLM(memory.content + hierarchy.nodes) → {node_id: "davinci-tech", confidence: 0.87}
                      </div>
                    </div>

                    <div className="p-3 border border-[#e3e0db] rounded-lg">
                      <div className="text-xs font-semibold text-[#16a34a] mb-1">B) Keyword Overlap</h4>
                      <p className="text-xs text-[#525252] mb-2">Jaccard similarity between memory tokens and node keywords</p>
                      <div className="text-[10px] font-mono bg-[#faf9f4] p-2 rounded">
                        tokens(memory) ∩ tokens(node_labels) → highest overlap wins
                      </div>
                    </div>

                    <div className="p-3 border border-[#e3e0db] rounded-lg">
                      <div className="text-xs font-semibold text-[#8b5cf6] mb-1">C) User-Driven</h4>
                      <p className="text-xs text-[#525252] mb-2">User manually selects or creates destination node during ingest</p>
                      <div className="text-[10px] font-mono bg-[#faf9f4] p-2 rounded">
                        UI: "Where should this memory live?" → dropdown + search
                      </div>
                    </div>
                  </div>

                  <div className="space-y-3">
                    <h4 className="text-xs font-semibold">Cross-Topic Handling:</h4>

                    <div className="p-3 bg-[#f59e0b]/5 border border-[#f59e0b]/20 rounded-lg">
                      <div className="text-xs font-semibold text-[#f59e0b] mb-1">Multiple Parent Nodes</div>
                      <p className="text-xs text-[#525252]">Single memory ID can appear under multiple hierarchy nodes</p>
                      <div className="text-[10px] text-[#a3a3a3] mt-1">
                        Example: "TARA clinical reasoning" → both /tara/clinical AND /ai-ml/reasoning
                      </div>
                    </div>

                    <div className="p-3 bg-[#8b5cf6]/5 border border-[#8b5cf6]/20 rounded-lg">
                      <div className="text-xs font-semibold text-[#8b5cf6] mb-1">Cross-Reference Tags</div>
                      <p className="text-xs text-[#525252]">Primary node + secondary topic tags for discoverability</p>
                      <div className="text-[10px] text-[#a3a3a3] mt-1">
                        Primary: /tara/sessions | Tags: [clinical, voice-agents, session-tracking]
                      </div>
                    </div>

                    <div className="p-3 bg-[#117dff]/5 border border-[#117dff]/20 rounded-lg">
                      <div className="text-xs font-semibold text-[#117dff] mb-1">Dynamic Reclassification</div>
                      <p className="text-xs text-[#525252]">CSI agent periodically audits and suggests node moves</p>
                      <div className="text-[10px] text-[#a3a3a3] mt-1">
                        Faraday probe: "This memory fits better under /knowledge/memory-systems"
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>

          {/* Questions for Discussion */}
          <div className="mt-6 p-4 bg-[#117dff]/5 border border-[#117dff]/20 rounded-xl">
            <h3 className="text-sm font-bold text-[#117dff] mb-3">🤔 Design Questions to Decide:</h3>
            <div className="grid grid-cols-2 gap-4 text-xs">
              <div>
                <strong>1. Hierarchy depth:</strong>
                <p className="text-[#525252]">Max 3 levels? Or unlimited nesting?</p>
              </div>
              <div>
                <strong>2. Auto vs manual:</strong>
                <p className="text-[#525252]">Auto-assign by default? User override?</p>
              </div>
              <div>
                <strong>3. Node ownership:</strong>
                <p className="text-[#525252]">Per-user trees? Org-wide shared?</p>
              </div>
              <div>
                <strong>4. Pruning strategy:</strong>
                <p className="text-[#525252]">Auto-merge sparse nodes? Threshold?</p>
              </div>
              <div>
                <strong>5. Profile layer:</strong>
                <p className="text-[#525252]">UserProfile table as parallel index?</p>
              </div>
              <div>
                <strong>6. Visualization:</strong>
                <p className="text-[#525252]">Tree view? Mind map? Both?</p>
              </div>
            </div>
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
